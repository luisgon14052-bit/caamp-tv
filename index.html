<script>
const supabaseClient = window.supabase.createClient(
  "https://pfdzieimosggmzmwikpj.supabase.co",
  "sb_publishable_aDhVtFxdRCCBgU-NEYozhw_JUrjmYlT"
);

let schedule = {};

  async function loadSchedule(){

  const { data: week, error: weekError } = await supabaseClient
    .from("weekly_schedules")
    .select("id")
    .eq("published", true)
    .single();

  if (weekError || !week) {
    console.error("No hay semana publicada");
    return;
  }

  const { data, error } = await supabaseClient
    .from("schedule_items")
    .select(`
      day,
      start_time,
      classes(name,color),
      coaches(
    name,
    photo_url
)
    `)
    .eq("schedule_id", week.id)
    .order("start_time");

  if (error) {
    console.error(error);
    return;
  }

  schedule = {
    sunday: [],
    monday: [],
    tuesday: [],
    wednesday: [],
    thursday: [],
    friday: [],
    saturday: [],
  };

  const dayMap = {
    "Lunes":"monday",
    "Martes":"tuesday",
    "Miércoles":"wednesday",
    "Jueves":"thursday",
    "Viernes":"friday",
    "Sábado":"saturday",
    "Domingo":"sunday"
  };

  data.forEach(item=>{
    const key=dayMap[item.day];
    if(!key) return;

    schedule[key].push({
  time: item.start_time,

  title: item.classes?.name ?? "",

  focus: (() => {
    switch (item.day) {
      case "Lunes":
        return "LOWER BODY • QUADS";

      case "Martes":
        return "UPPER BODY • PULL DAY";

      case "Miércoles":
        return "ALL ABOUT THE CORE";

      case "Jueves":
        return "LOWER BODY • GLUTES";

      case "Viernes":
        return "UPPER BODY • PUSH DAY";

      case "Sábado":
      case "Domingo":
        return "FULL BODY";

      default:
        return "";
    }
  })(),

  coach: item.coaches?.name ?? "",
  photo: item.coaches?.photo_url ?? "./logo.png"
});
  });

  console.log("Horario cargado", schedule);
}


function update(){

  const now = new Date();

  document.getElementById('time').innerHTML =
    now.toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    });

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('es-MX',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });

  const days = [
    'sunday','monday','tuesday',
    'wednesday','thursday',
    'friday','saturday'
  ];

  const today =
    schedule[days[now.getDay()]] || [];

  let nextClass = null;

  for(const c of today){
    const [h,m] = c.time.split(':');

    const d = new Date();
    d.setHours(h,m,0,0);

    if(d > now){
      nextClass = c;
      break;
    }
  }

  const elapsed =
    Math.floor(Date.now()/1000) % 300;


  const content =
    document.getElementById('content');

  document.body.classList.remove('green-mode');

  if(!nextClass){
    content.innerHTML = `
      <div class="goodbye">
        <h1>
          THANK YOU<br>
          FOR TRAINING
        </h1>

        <p>
          SEE YOU TOMORROW
          <br><br>
          @caampst
        </p>
      </div>
    `;
    return;
  }

  const [h,m] = nextClass.time.split(':');

  const classDate = new Date();
  classDate.setHours(h,m,0,0);

  const diff = Math.max(
    0,
    Math.floor((classDate-now)/1000)
  );

  let countdownText;

  if(diff >= 3600){
    const hours = Math.floor(diff/3600);
    const mins = Math.floor((diff % 3600)/60);
    countdownText = `${hours} h ${String(mins).padStart(2,'0')} min`;
  }else{
    const minutes = Math.floor(diff/60);
    const seconds = diff%60;
    countdownText = `${minutes}:${String(seconds).padStart(2,'0')}`;
  }

  
if((elapsed >= 120 && elapsed < 150) || elapsed >= 270){

  content.innerHTML = '';

  if(!document.getElementById('logoRain').classList.contains('show')){
    showLogoRain();
  }

  return;
}

if(elapsed >= 150 && elapsed < 270){

  let list = `
    <div class="todayTitle">
      TODAY'S TRAIN
    </div>

    <div class="todayList">
  `;

  today.forEach(c=>{

    const [h,m] = c.time.split(':');

    const d = new Date();
    d.setHours(h,m,0,0);

    const isPast = d < now;
    const isNext = nextClass && c.time === nextClass.time;

    const photo =
      Array.isArray(c.photo)
        ? c.photo[0]
        : c.photo;

    list += `
      <div class="todayItem ${isPast ? 'past' : ''} ${isNext ? 'next' : ''}">

        <img
          src="${photo}"
          class="todayPhoto"
        >

        <div class="todayInfo">
          <div class="todayCoach">
            ${c.coach}
          </div>

          <div class="todayClass">
            ${c.title}
          </div>
        </div>

        <div class="todayTime">
          ${new Date(`2000-01-01T${c.time}`)
            .toLocaleTimeString(
              'es-MX',
              {
                hour:'numeric',
                minute:'2-digit'
              }
            )}
        </div>

      </div>
    `;
  });

  list += `</div>`;

  content.innerHTML = list;

  return;
}

if(diff <= 300){

  document.body.classList.add('green-mode');

  content.innerHTML = `
<div class="backgroundCoach"
style="background-image:url('${nextClass.photo}')"></div>

<div class="overlay"></div>

<div class="foreground">

  <div class="label">PRÓXIMA CLASE</div>

  <div class="class">
    ${nextClass.title}
  </div>

  <div class="focus">
    ${nextClass.focus}
  </div>

  <div class="coach">
    ${nextClass.coach}
  </div>

  <div class="classTime">
    ${new Date(`2000-01-01T${nextClass.time}`).toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    })}
  </div>

  <div class="countLabel">
    COMIENZA EN
  </div>

  <div class="countdown">
    ${countdownText}
  </div>

</div>
`;

}else{

  content.innerHTML = `
<div class="backgroundCoach"
style="background-image:url('${nextClass.photo}')"></div>

<div class="overlay"></div>

<div class="foreground">

  <div class="label">PRÓXIMA CLASE</div>

  <div class="class">
    ${nextClass.title}
  </div>

  <div class="focus">
    ${nextClass.focus}
  </div>

  <div class="coach">
    ${nextClass.coach}
  </div>

  <div class="classTime">
    ${new Date(`2000-01-01T${nextClass.time}`).toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    })}
  </div>

  <div class="countLabel">
    COMIENZA EN
  </div>

  <div class="countdown">
    ${countdownText}
  </div>

</div>
`;

}
}  
  function showLogoRain(){

  const rain = document.getElementById('logoRain');
  if(!rain) return;

  rain.innerHTML = '';
  rain.classList.add('show');

  const interval = setInterval(()=>{
    for(let i=0;i<12;i++){
      const img = document.createElement('img');
      img.src = './logo.png';
      img.className = 'fallingLogo';
      img.style.left = Math.random()*1800 + 'px';
      img.style.top = '-150px';
      img.style.width = (20 + Math.random()*25) + 'px';
      img.style.animationDuration =
        (5 + Math.random()*5) + 's';

      rain.appendChild(img);

      img.addEventListener('animationend',()=>{
        img.remove();
      });
    }
  },120);

  setTimeout(()=>{
    clearInterval(interval);
    rain.classList.remove('show');
    rain.innerHTML = '';
  },30000);
}



const scale = Math.min(
  window.innerWidth / 1920,
  window.innerHeight / 1080
) * 0.95;

const screen = document.querySelector('.screen');

screen.style.left = '0';
screen.style.top = '20px';

screen.style.transform =
  `rotate(90deg) scale(${scale}) translateY(-100%)`;

loadSchedule();
setInterval(loadSchedule,30000);

update();
setInterval(update,1000);

</script>
