function update(){

  const now = new Date();

  document.getElementById('time').innerHTML =
    now.toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    });

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('es-MX',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });

  const days = [
    'sunday','monday','tuesday',
    'wednesday','thursday',
    'friday','saturday'
  ];

  const today =
    schedule[days[now.getDay()]] || [];

  let nextClass = null;

  for(const c of today){
    const [h,m] = c.time.split(':');

    const d = new Date();
    d.setHours(h,m,0,0);

    if(d > now){
      nextClass = c;
      break;
    }
  }

  const content =
    document.getElementById('content');

  document.body.classList.remove('green-mode');

  if(!nextClass){
    content.innerHTML = `
      <div class="goodbye">
        <h1>
          THANK YOU<br>
          FOR TRAINING
        </h1>

        <p>
          SEE YOU TOMORROW
          <br><br>
          @caampst
        </p>
      </div>
    `;
    return;
  }

  const [h,m] = nextClass.time.split(':');

  const classDate = new Date();
  classDate.setHours(h,m,0,0);

  const diff = Math.max(
    0,
    Math.floor((classDate-now)/1000)
  );

  let countdownText;

  if(diff >= 3600){
    const hours = Math.floor(diff/3600);
    const mins = Math.floor((diff % 3600)/60);
    countdownText = `${hours} h ${String(mins).padStart(2,'0')} min`;
  }else{
    const minutes = Math.floor(diff/60);
    const seconds = diff%60;
    countdownText = `${minutes}:${String(seconds).padStart(2,'0')}`;
  }

  if(diff <= 300){
    document.body.classList.add('green-mode');

    content.innerHTML = `
      <div class="label">
        PRÓXIMA CLASE
      </div>

      <div class="class">
        ${nextClass.class}
      </div>

      <div class="countLabel">
        COMIENZA EN
      </div>

      <div class="countdown">
        ${countdownText}
      </div>
    `;

  } else {

    content.innerHTML = `

      </div>
