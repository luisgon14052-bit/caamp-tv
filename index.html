<style>

</head>
<body>

<div class="container">

<div class="logo">CAAMP</div>

<div class="time" id="time"></div>
<div class="date" id="date"></div>

<div id="content"></div>

<div class="footer">
@caampst<br><br>
TRAIN. EVOLVE. BELONG.
</div>

</div>

<script>

const schedule = {
  monday: [
    { time: "17:20", class: "LOWER BODY: QUADS", coach: "Rosella" },
    { time: "18:30", class: "LOWER BODY: QUADS", coach: "Andrea Dusten" },
    { time: "19:30", class: "LOWER BODY: QUADS", coach: "Baca" },
    { time: "20:30", class: "LOWER BODY: QUADS", coach: "Misa" }
  ],

  tuesday: [
    { time: "17:20", class: "UPPER BODY: PULL", coach: "Rosella" },
    { time: "18:30", class: "UPPER BODY: PULL", coach: "Andrea Dusten" },
    { time: "19:30", class: "UPPER BODY: PULL", coach: "Sofia DM" },
    { time: "20:30", class: "UPPER BODY: PULL", coach: "Misa" }
  ],

  wednesday: [
    { time: "17:20", class: "ALL ABOUT THE CORE", coach: "Luis Gonzalez" },
    { time: "18:30", class: "ALL ABOUT THE CORE", coach: "Sofia DM" },
    { time: "19:30", class: "ALL ABOUT THE CORE", coach: "Caap" },
    { time: "20:30", class: "ALL ABOUT THE CORE", coach: "Caap" }
  ],

  thursday: [
    { time: "17:20", class: "LOWER BODY: GLUTES", coach: "Misa" },
    { time: "18:30", class: "LOWER BODY: GLUTES", coach: "Rosella" },
    { time: "19:30", class: "LOWER BODY: GLUTES", coach: "Luis Gonzalez" },
    { time: "20:30", class: "LOWER BODY: GLUTES", coach: "Misa" }
  ],

  friday: [
    { time: "17:20", class: "UPPER BODY: PUSH", coach: "Luis Gonzalez" },
    { time: "18:30", class: "UPPER BODY: PUSH", coach: "Luis Gonzalez" },
    { time: "19:30", class: "UPPER BODY: PUSH", coach: "Misa" }
  ],

  saturday: [
    { time: "08:10", class: "FULL BODY", coach: "Andrea Dusten" },
    { time: "09:20", class: "FULL BODY - FOCUS LOWER", coach: "Misa" },
    { time: "10:30", class: "FULL BODY - FOCUS ABS", coach: "Zazu / Andrea" },
    { time: "11:30", class: "FULL BODY - FOCUS UPPER", coach: "Luis Gonzalez" }
  ],

  sunday: [
    { time: "09:30", class: "FULL BODY", coach: "Misa" },
    { time: "10:30", class: "FULL BODY / PT", coach: "Andrea Dusten" },
    { time: "11:30", class: "FULL BODY", coach: "Luis Gonzalez" }
  ]
};

function update(){

  const now = new Date();

  document.getElementById("time").innerHTML =
    now.toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    });

  document.getElementById("date").innerHTML =
    now.toLocaleDateString('es-MX',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });

  const days = [
    'sunday','monday','tuesday',
    'wednesday','thursday',
    'friday','saturday'
  ];

  const today = schedule[days[now.getDay()]] || [];

  let nextClass = null;

  for(const c of today){

    const [h,m] = c.time.split(":");

    const classDate = new Date();
    classDate.setHours(h,m,0);

    if(classDate > now){
      nextClass = c;
      break;
    }
  }

  const content =
    document.getElementById("content");

  if(!nextClass){

    content.innerHTML = `
      <div class="closed">
        NO HAY MÁS<br>CLASES HOY
      </div>
    `;

    return;
  }

  const [h,m] = nextClass.time.split(":");

  const nextDate = new Date();
  nextDate.setHours(h,m,0);

  const diff =
    Math.floor((nextDate-now)/1000);

  const minutes =
    Math.floor(diff/60);

  const seconds =
    diff%60;

  const upcoming =
    today
      .filter(c => c.time > nextClass.time)
      .slice(0,3);

  content.innerHTML = `
    <div class="tag">PRÓXIMA CLASE</div>

    <div class="class">
      ${nextClass.class}
    </div>

    <div class="coach">
      ${nextClass.coach}
    </div>

    <div class="classTime">
      ${nextClass.time}
    </div>

    <div class="countLabel">
      COMIENZA EN
    </div>

    <div class="countdown">
      ${minutes}:${String(seconds).padStart(2,'0')}
    </div>

    <div class="next">
      <h2>DESPUÉS</h2>

      ${
        upcoming.map(c => `
          <div class="card">
            <span>${c.time}</span>
            <span>${c.class}</span>
          </div>
        `).join('')
      }
    </div>
  `;
}

setInterval(update,1000);
update();

</script>

</body>
</html>
