<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAAMP TV</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:#fff;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .screen{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      padding:60px;
    }

    .logo{
      font-size:80px;
      font-weight:900;
      letter-spacing:4px;
    }

    .time{
      margin-top:40px;
      font-size:90px;
      font-weight:700;
    }

    .date{
      color:#777;
      font-size:32px;
      margin-bottom:80px;
    }

    .tag{
      color:#888;
      letter-spacing:5px;
      font-size:28px;
      margin-bottom:20px;
    }

    .class{
      font-size:88px;
      font-weight:900;
      line-height:0.95;
      text-transform:uppercase;
    }

    .coach{
      margin-top:40px;
      font-size:42px;
      color:#ddd;
    }

    .nextTime{
      margin-top:20px;
      font-size:80px;
      font-weight:700;
    }

    .coming{
      margin-top:40px;
      color:#999;
      font-size:28px;
    }

    .countdown{
      font-size:130px;
      font-weight:900;
      margin-top:10px;
    }

    .footer{
      margin-top:auto;
      border-top:1px solid #222;
      padding-top:40px;
      color:#777;
      font-size:28px;
    }
  </style>
</head>

<body>

<div class="screen">

  <div class="logo">CAAMP</div>

  <div class="time" id="time"></div>
  <div class="date" id="date"></div>

  <div class="tag">
    PRÓXIMA CLASE
  </div>

  <div class="class">
    LOWER BODY:<br>
    QUADS
  </div>

  <div class="coach">
    Andrea Dusten
  </div>

  <div class="nextTime">
    6:30 PM
  </div>

  <div class="coming">
    COMIENZA EN
  </div>

  <div class="countdown" id="countdown">
    12:47
  </div>

  <div class="footer">
    @caampst<br><br>
    TRAIN. EVOLVE. BELONG.
  </div>

</div>

<script>
function updateClock(){
  const now = new Date();

  document.getElementById('time').innerHTML =
    now.toLocaleTimeString('es-MX',{
      hour:'numeric',
      minute:'2-digit'
    });

  document.getElementById('date').innerHTML =
    now.toLocaleDateString('es-MX',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
