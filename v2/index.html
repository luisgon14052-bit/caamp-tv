<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CAAMP TV V2</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div id="tv">

    <!-- ========================= -->
    <!-- WELCOME VIDEO -->
    <!-- ========================= -->

    <section id="welcome-screen" class="screen active">

        <video
            id="welcome-video"
            autoplay
            muted
            playsinline
            preload="auto">

            <source
                src="https://pfdzieimosggmzmwikpj.supabase.co/storage/v1/object/public/tv-media/welcome.mp4"
                type="video/mp4">

        </video>

        <div class="overlay"></div>

    </section>


    <!-- ========================= -->
    <!-- NEXT CLASS -->
    <!-- ========================= -->

    <section id="next-screen" class="screen">

        <div id="coach-background"></div>

        <div class="overlay"></div>

        <div class="content">

            <h3>NEXT CLASS</h3>

            <h1 id="class-name">
                Loading...
            </h1>

            <h2 id="coach-name">
            </h2>

            <p id="countdown">
            </p>

        </div>

    </section>


    <!-- ========================= -->
    <!-- TODAY -->
    <!-- ========================= -->

    <section id="schedule-screen" class="screen">

        <div class="overlay"></div>

        <div class="content">

            <h3>TODAY'S TRAIN</h3>

            <div id="today-schedule">

            </div>

        </div>

    </section>

</div>

<!-- ========================= -->
<!-- JAVASCRIPT -->
<!-- ========================= -->

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/state.js"></script>
<script src="js/schedule.js"></script>
<script src="js/media.js"></script>
<script src="js/router.js"></script>
<script src="js/ui.js"></script>
<script src="js/clock.js"></script>
<script src="js/app.js"></script>

</body>
</html>
