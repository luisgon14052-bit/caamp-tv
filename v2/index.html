<!DOCTYPE html>
<html lang="es">
<head>

</head>

<body>

<!-- WELCOME -->

<section id="welcome-screen" class="screen active">

    <video
        id="welcome-video"
        autoplay
        muted
        playsinline>

        <source
            src="https://pfdzieimosggmzmwikpj.supabase.co/storage/v1/object/public/tv-media/welcome.mp4"
            type="video/mp4">

    </video>

    <div class="overlay"></div>

</section>
<section id="next-screen" class="screen">

    <div id="coach-background"></div>

    <div class="overlay"></div>

    <div class="content">

        <h3>NEXT CLASS</h3>

        <h1 id="class-name"></h1>

        <h2 id="coach-name"></h2>

        <p id="countdown"></p>

    </div>

</section>

<!-- TODAY -->

<section id="schedule-screen" class="screen">

    <div class="content">

        <h3>TODAY'S TRAIN</h3>

    </div>

</section>

<script src="js/app.js"></script>
